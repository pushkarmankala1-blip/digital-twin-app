<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinatorial Twin Audit</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #111; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 15px; font-family: inherit; resize: vertical; }
        button { background-color: #000; color: #fff; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background-color: #333; }
        .response-box { margin-top: 20px; padding: 15px; background: #f9f9f9; border-left: 4px solid #000; display: none; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
        .loading { display: none; margin-top: 15px; font-style: italic; color: #666; }
    </style>
<style>
  /* Import a clean, modern font */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  body {
    font-family: 'Inter', sans-serif;
    background-color: #0f172a; /* Deep slate background */
    color: #f8fafc;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }

  /* The Main Dashboard Card */
  .container {
    background: #1e293b;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    width: 100%;
    max-width: 700px;
  }

  h1 {
    margin-top: 0;
    font-size: 28px;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p {
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* The Input Matrix */
  textarea {
    width: 100%;
    background: #0f172a;
    color: #e2e8f0;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    line-height: 1.5;
    resize: vertical;
    min-height: 120px;
    box-sizing: border-box;
    transition: all 0.3s ease;
  }

  textarea:focus {
    border-color: #60a5fa;
    outline: none;
    box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
  }

  /* The Audit Button */
  button {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white;
    border: none;
    padding: 16px 24px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
    transition: transform 0.1s, box-shadow 0.3s;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
  }

  button:hover {
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
    transform: translateY(-2px);
  }

  button:active {
    transform: translateY(1px);
  }

  /* The Output Zone */
  #response-area {
    margin-top: 30px;
    padding: 20px;
    border-left: 4px solid #8b5cf6;
    background: #0f172a;
    border-radius: 0 12px 12px 0;
    font-size: 15px;
    line-height: 1.7;
    color: #e2e8f0;
    white-space: pre-wrap; /* Keeps Gemini's formatting */
    display: none; /* Hidden until there is a response */
  }
</style>
</head>
<body>

<div class="container">
    <h1>Combinatorial Audit Agent</h1>
    <p>Describe your business model, app idea, or operational workflow below. The agent will test it against the 50 network scaling laws.</p>
    
    <textarea id="prompt" placeholder="e.g., We are building a new B2B marketplace for local hardware stores..."></textarea>
    <button onclick="runAudit()">Run System Audit</button>
    
    <div id="loading" class="loading">Analyzing structural mechanics...</div>
    <div id="responseBox" class="response-box"></div>
</div>

<script>
  async function runAudit() {
    // 1. Grab the button and the text boxes on your screen
    const button = document.querySelector('button');
    const responseArea = document.getElementById('response-area');
    const userPrompt = document.getElementById('prompt').value;

    // 2. TURN ON THE LOADING STATE (Happens instantly when clicked)
    button.innerText = "Auditing Network Mechanics...";
    button.disabled = true; // Locks the button so they can't spam click it
    responseArea.style.display = "block"; // Makes the hidden response box visible
    responseArea.innerText = "Querying vector database... this takes a few seconds.";

    try {
      // 3. Send the data to your Vercel backend
      const response = await fetch('/api/audit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: userPrompt })
      });
      
      const data = await response.json();

      // 4. TURN OFF THE LOADING STATE (Happens when the AI finishes)
      button.innerText = "Run System Audit";
      button.disabled = false; // Unlocks the button
      
      // 5. Show the actual final AI answer on the screen
      if (data.reply) {
          responseArea.innerText = data.reply;
      } else {
          responseArea.innerText = "Error: " + data.error;
      }

    } catch (error) {
      // If the internet drops or something crashes, reset the button
      button.innerText = "Run System Audit";
      button.disabled = false;
      responseArea.innerText = "Connection failed. Please try again.";
    }
  }
</script>
</body>
</html>
