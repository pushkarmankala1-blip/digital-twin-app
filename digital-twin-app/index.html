<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinatorial Twin Audit</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #111; }
        textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 15px; font-family: inherit; resize: vertical; }
        button { background-color: #000; color: #fff; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background-color: #333; }
        .response-box { margin-top: 20px; padding: 15px; background: #f9f9f9; border-left: 4px solid #000; display: none; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
        .loading { display: none; margin-top: 15px; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Combinatorial Audit Agent</h1>
    <p>Describe your business model, app idea, or operational workflow below. The agent will test it against the 50 network scaling laws.</p>
    
    <textarea id="prompt" placeholder="e.g., We are building a new B2B marketplace for local hardware stores..."></textarea>
    <button onclick="runAudit()">Run System Audit</button>
    
    <div id="loading" class="loading">Analyzing structural mechanics...</div>
    <div id="responseBox" class="response-box"></div>
</div>

<script>
    async function runAudit() {
        const prompt = document.getElementById('prompt').value;
        const responseBox = document.getElementById('responseBox');
        const loading = document.getElementById('loading');

        if (!prompt.trim()) return;

        responseBox.style.display = 'none';
        loading.style.display = 'block';

        try {
            // This calls your Vercel backend
            const res = await fetch('/api/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            
            const data = await res.json();
            
            loading.style.display = 'none';
            responseBox.innerText = data.reply || "Error: No response generated.";
            responseBox.style.display = 'block';

        } catch (error) {
            loading.style.display = 'none';
            responseBox.innerText = "System Failure. Could not connect to the API.";
            responseBox.style.display = 'block';
        }
    }
</script>

</body>
</html>
